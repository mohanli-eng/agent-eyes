<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Performance Page</title>
<style>
  body { font-family: sans-serif; }
  .hero { width: 100%; height: 400px; background: linear-gradient(135deg, #667eea, #764ba2); }
</style>
</head>
<body>
<h1>Performance Test Page</h1>
<div class="hero"></div>
<p>Content below the large element to test LCP.</p>

<script>
  // Long task (~200ms) to generate TBT data
  const start = performance.now();
  while (performance.now() - start < 200) {
    Math.sqrt(Math.random());
  }

  // Dynamic content insertion (may trigger CLS)
  setTimeout(() => {
    const div = document.createElement('div');
    div.textContent = 'Dynamically inserted content';
    div.style.height = '100px';
    div.style.background = '#f0f0f0';
    document.body.insertBefore(div, document.body.firstChild);
  }, 500);
</script>
</body>
</html>
